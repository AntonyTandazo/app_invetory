<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sistema de Inventario</title>
    <link rel="stylesheet" href="./styles/global.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>

<body>
    <div id="app">
        <!-- Sidebar -->
        <nav class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <svg class="sidebar-logo" viewBox="0 0 32 32" fill="none">
                    <rect width="32" height="32" rx="8" fill="#4f6ef7" fill-opacity="0.2" />
                    <path d="M8 12h16M8 16h16M8 20h10" stroke="#4f6ef7" stroke-width="2" stroke-linecap="round" />
                </svg>
                <span class="sidebar-logo-text">Inventario Pro</span>
                <button class="hamburger" id="hamburger" title="Menú">
                    <span></span><span></span><span></span>
                </button>
            </div>

            <div class="nav-items">
                <div class="nav-section">
                    <div class="sidebar-section-label">Principal</div>
                    <button class="nav-item active" data-page="dashboard" id="nav-dashboard">
                        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="3" width="7" height="7" />
                            <rect x="14" y="3" width="7" height="7" />
                            <rect x="3" y="14" width="7" height="7" />
                            <rect x="14" y="14" width="7" height="7" />
                        </svg>
                        <span class="nav-label">Dashboard</span>
                    </button>
                    <button class="nav-item" data-page="products" id="nav-products">
                        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path
                                d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z" />
                        </svg>
                        <span class="nav-label">Productos</span>
                    </button>
                </div>
                <div class="nav-section">
                    <div class="sidebar-section-label">Operaciones</div>
                    <button class="nav-item" data-page="sales" id="nav-sales">
                        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z" />
                            <line x1="3" y1="6" x2="21" y2="6" />
                            <path d="M16 10a4 4 0 0 1-8 0" />
                        </svg>
                        <span class="nav-label">Gestión Ventas</span>
                    </button>
                    <button class="nav-item" data-page="clients" id="nav-clients">
                        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
                            <circle cx="9" cy="7" r="4" />
                            <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
                            <path d="M16 3.13a4 4 0 0 1 0 7.75" />
                        </svg>
                        <span class="nav-label">Gestión Clientes</span>
                    </button>
                    <button class="nav-item" data-page="cobranza" id="nav-cobranza">
                        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="2" y="5" width="20" height="14" rx="2" />
                            <line x1="2" y1="10" x2="22" y2="10" />
                        </svg>
                        <span class="nav-label">Cobranza</span>
                    </button>
                    <button class="nav-item" data-page="deliveries" id="nav-deliveries">
                        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="1" y="3" width="15" height="13" />
                            <polygon points="16 8 20 8 23 11 23 16 16 16 16 8" />
                            <circle cx="5.5" cy="18.5" r="2.5" />
                            <circle cx="18.5" cy="18.5" r="2.5" />
                        </svg>
                        <span class="nav-label">Entregas</span>
                    </button>
                </div>
                <div class="nav-section">
                    <div class="sidebar-section-label">Análisis</div>
                    <button class="nav-item" data-page="reports" id="nav-reports">
                        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="18" y1="20" x2="18" y2="10" />
                            <line x1="12" y1="20" x2="12" y2="4" />
                            <line x1="6" y1="20" x2="6" y2="14" />
                        </svg>
                        <span class="nav-label">Reportes</span>
                    </button>
                </div>
                <div class="nav-section">
                    <div class="sidebar-section-label">Sistema</div>
                    <button class="nav-item" data-page="settings" id="nav-settings">
                        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="3" />
                            <path
                                d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
                        </svg>
                        <span class="nav-label">Configuración</span>
                    </button>
                    <div class="nav-divider"></div>
                    <button class="nav-item danger" id="nav-logout">
                        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                            <polyline points="16 17 21 12 16 7" />
                            <line x1="21" y1="12" x2="9" y2="12" />
                        </svg>
                        <span class="nav-label">Salir</span>
                    </button>
                </div>
            </div>
        </nav>

        <!-- Right content -->
        <div class="content-wrapper">
            <!-- Title bar -->
            <div class="titlebar" id="titlebar">
                <span class="titlebar-title" id="titlebar-title">Dashboard</span>
                <div class="titlebar-controls">
                    <button class="titlebar-btn" id="win-min" title="Minimizar">─</button>
                    <button class="titlebar-btn" id="win-max" title="Maximizar">□</button>
                    <button class="titlebar-btn close" id="win-close" title="Cerrar">✕</button>
                </div>
            </div>

            <!-- Main content area with pages -->
            <div class="main-content" id="main-content">
                <div id="page-loading" class="loading">
                    <div class="spinner"></div> Cargando...
                </div>

                <div class="page active" id="page-dashboard"></div>
                <div class="page" id="page-products"></div>
                <div class="page" id="page-sales"></div>
                <div class="page" id="page-clients"></div>
                <div class="page" id="page-cobranza"></div>
                <div class="page" id="page-deliveries"></div>
                <div class="page" id="page-reports"></div>
                <div class="page" id="page-settings"></div>
            </div>
        </div>
    </div>

    <!-- Toast container -->
    <div id="toast-container"></div>

    <!-- Modal container -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal" id="modal-box">
            <div class="modal-header">
                <h3 class="modal-title" id="modal-title"></h3>
                <button class="modal-close" id="modal-close">✕</button>
            </div>
            <div id="modal-body"></div>
        </div>
    </div>

    <script src="./js/utils.js"></script>
    <script src="./js/dashboard.js"></script>
    <script src="./js/products.js"></script>
    <script src="./js/sales.js"></script>
    <script src="./js/clients.js"></script>
    <script src="./js/cobranza.js"></script>
    <script src="./js/deliveries.js"></script>
    <script src="./js/reports.js"></script>
    <script src="./js/settings.js"></script>
    <script src="./js/app.js"></script>
</body>

</html>
